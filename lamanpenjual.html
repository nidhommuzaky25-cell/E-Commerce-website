<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Barang - NoirCollection</title>
  <link rel="stylesheet" href="lamanpenjual.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container">
      <h1>NoirCollection</h1>
      <nav>
        <ul>
          <li><a href="loginsebagai.html">Beranda</a></li>
          <li><a href="#">Produk</a></li>
          <li><a href="#">Pesanan</a></li>
          <li><a href="#">Keuangan</a></li>
          <li><a href="loginpenjual.html">Logout</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <div class="container">
    <section class="manage-products">
      <h2>Kelola Produk</h2>
      <table>
        <thead>
          <tr>
            <th>Gambar</th>
            <th>Nama Produk</th>
            <th>Harga</th>
            <th>Stok</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><img src="tsrvsp.jpg" alt="Produk A"></td>
            <td>Tshirt ravispa</td>
            <td>Rp 125,000</td>
            <td>40</td>
            <td>
              <button class="edit-btn">Edit</button>
              <button class="delete-btn">Hapus</button>
            </td>
          </tr>
          <tr>
            <td><img src="pants png.jpg" alt="Produk B"></td>
            <td>ballon Pants Nike</td>
            <td>Rp 559,000</td>
            <td>15</td>
            <td>
              <button class="edit-btn">Edit</button>
              <button class="delete-btn">Hapus</button>
            </td>
          </tr>
          <tr>
            <td><img src="4030f16e-4c66-4e1c-bc8d-be9a00ca0a0d-removebg-preview.png" alt="Produk C"></td>
            <td>new Ballance 530</td>
            <td>Rp 2.0000,000</td>
            <td>3</td>
            <td>
              <button class="edit-btn">Edit</button>
              <button class="delete-btn">Hapus</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="add-product">
        <a href="tambahbarang.html">Tambah Produk</a>
      </div>
    </section>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 NoirCollection. Semua Hak Dilindungi.</p>
  </footer>

</body>
</html>
