<html>
<head>
    <title>Formulir Pembayaran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .form-group input[type="radio"] {
            width: auto;
        }
        .form-group .radio-label {
            display: inline-block;
            margin-right: 10px;
        }
        .form-group .radio-group {
            display: flex;
            align-items: center;
        }
        .form-group .radio-group input {
            margin-right: 5px;
        }
        .form-group .radio-group label {
            margin-right: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #206552;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background: #0adb96;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Formulir Pembayaran</h1>
        <form>
            <div class="form-group">
                <label for="name">Nama:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="address">Alamat:</label>
                <input type="text" id="address" name="address" required>
            </div>
            <div class="form-group">
                <label for="shipping-method">Metode Pengiriman:</label>
                <select id="shipping-method" name="shipping-method" required>
                    <option value="standard">Standard</option>
                    <option value="express">Express</option>
                    <option value="overnight">Overnight</option>
                </select>
            </div>
            <div class="form-group">
                <label>Metode Pembayaran:</label>
                <div class="radio-group">
                    <input type="radio" id="credit-card" name="payment-method" value="credit-card" required>
                    <label for="credit-card" class="radio-label">Kartu Kredit</label>
                    <input type="radio" id="paypal" name="payment-method" value="paypal">
                    <label for="paypal" class="radio-label">PayPal</label>
                    <input type="radio" id="bank-transfer" name="payment-method" value="bank-transfer">
                    <label for="bank-transfer" class="radio-label">Transfer Bank</label>
                </div>
            </div>
            <button type="submit" class="btn"><a href="checkoutberhasil.html">Bayar Sekarang</a></button>
        </form>
    </div>
</body>
</html>
